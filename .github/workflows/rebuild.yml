name: Rebuild calculators

# Runs the existing Node build against your live API and commits the rebuilt
# blocks back to the repo. Your WordPress plugin then pulls them on WP-Cron.
# You never run any of this by hand — it fires nightly, plus a "Run workflow"
# button for an instant update after you change a number in the database.

on:
  schedule:
    - cron: '0 6 * * *'   # every day at 06:00 UTC
  workflow_dispatch: {}    # adds the manual "Run workflow" button

permissions:
  contents: write          # lets the job commit the rebuilt blocks back

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build blocks from the live database
        env:
          CCX_API_URL:   ${{ secrets.CCX_API_URL }}
          CCX_API_TOKEN: ${{ secrets.CCX_API_TOKEN }}
        run: |
          node generator/api-adapter.js --write
          node generator/build-static.js
          node generator/build-embedded.js
          node generator/build-bundle.js

      - name: Publish the rebuilt blocks
        run: |
          git config user.name  ccx-bot
          git config user.email ccx-bot@users.noreply.github.com
          git add dist src/config.js
          git commit -m "Rebuild blocks from live API" || echo "nothing changed"
          git push
